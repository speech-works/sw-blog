# Netlify config for the blog (the Next.js app in web/).
# Explicitly declares the Next.js runtime so SSR/ISR routes are served by
# functions instead of being deployed as static files.
[build]
  base = "web"
  # Run DB migrations first (applies any pending schema changes to Neon),
  # then build the Next.js app.
  command = "npm run payload -- migrate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
